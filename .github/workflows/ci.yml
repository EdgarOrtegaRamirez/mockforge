name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download || true

      - name: Run tests
        run: go test ./... -v -race

      - name: Build
        run: go build -o mockforge ./cmd/mockforge/

      - name: Verify help
        run: ./mockforge --help

      - name: Verify person generation
        run: ./mockforge person -n 5 -f json | head -3

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run go vet
        run: go vet ./...

      - name: Run gofmt check
        run: test -z $(gofmt -l ./...)